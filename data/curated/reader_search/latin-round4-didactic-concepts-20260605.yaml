    source_queries:
      - "Seneca De Brevitate Vitae"
      - "De Brevitate Vitae maior pars mortalium"
      - "Seneca On the Shortness of Life Latin"
    explanation: >
      De Brevitate Vitae is a compact Stoic prose target for moral vocabulary,
