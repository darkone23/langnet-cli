    source_queries:
      - "Aeschylus Seven Against Thebes Eteocles Polyneices"
      - "Seven Against Thebes gates"
      - "Aeschylus Theban trilogy"
    explanation: >
      Seven Against Thebes gives students martial, civic, and kinship language
      organized around the gate sequence and the fratricidal climax of Theban
      myth.

  - id: "aeschylus-eumenides-furies-athena"
    language: "grc"
    labels:
      - "Aeschylus Eumenides"
      - "Eumenides"
      - "Furies"
      - "Athena"
      - "Oresteia"
      - "Areopagus"
      - "Εὐμενίδες"
    source_queries:
      - "Aeschylus Eumenides Oresteia Furies Athena"
      - "Eumenides Areopagus trial"
      - "Aeschylus Furies Athena"
    explanation: >
      Eumenides is central for legal, civic, and religious Greek, ending the
      Oresteia with trial language, persuasion, and the transformation of
      vengeance into civic order.

  - id: "aeschylus-choephoroi-libation-bearers"
